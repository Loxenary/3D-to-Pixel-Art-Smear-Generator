name: release-pr

# Run this manually from Actions when you're ready to cut a release.
# It opens a PR from main → release with a changelog since the last tag.
on:
  workflow_dispatch:

jobs:
  open-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Open release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v$(jq -r .version package.json)"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${VERSION}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges)
          else
            CHANGELOG=$(git log HEAD --pretty=format:"- %s" --no-merges | head -20)
          fi
          EXISTING=$(gh pr list --base release --head main --state open --json number -q '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already open for main → release, skipping"
          else
            gh pr create \
              --base release \
              --head main \
              --title "release $VERSION" \
              --body "${VERSION}"$'\n\n'"${CHANGELOG}"
          fi
